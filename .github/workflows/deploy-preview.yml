name: Deploy Preview

on:
  push:
    branches: [main]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Run EAS Update
        env:
          EAS_SECRET_TOKEN: ${{ secrets.EAS_SECRET_TOKEN }}
        run: npx eas update --branch preview --non-interactive